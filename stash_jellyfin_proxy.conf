# Stash-Jellyfin Proxy Configuration
# ===================================
# Edit this file to configure the proxy, then restart the server.
# Most settings can also be edited live from the Web UI at port 8097
# (the UI rewrites this file in place and triggers a hot-reload).

#################################################################################
# ---- Connection ----
#################################################################################

# Stash server URL.
# Examples: http://localhost:9999, https://stash.example.com
STASH_URL = "http://localhost:9999"

# Stash API key — Stash → Settings → Security → API Key
STASH_API_KEY = ""

# Client login (Swiftfin / Infuse / SenPlayer log in with these).
SJS_USER = ""
SJS_PASSWORD = ""

# Proxy bind address + Jellyfin API port.
PROXY_BIND = "0.0.0.0"
PROXY_PORT = 8096

# Web UI port (set to 0 to disable the UI entirely).
UI_PORT = 8097

# GraphQL endpoint path. Use /graphql-local if Stash sits behind a SWAG
# reverse proxy that intercepts /graphql.
# STASH_GRAPHQL_PATH = /graphql

# TLS verification for Stash. Default false matches Docker setups with
# self-signed certs; set true if Stash has a real cert.
# STASH_VERIFY_TLS = false


#################################################################################
# ---- Server Identity ----
#################################################################################

# Server name shown in Jellyfin clients.
SERVER_NAME = "Stash Media Server"

# Unique server identifier. Auto-generated on first run if left empty.
# Once set, do NOT change it — clients will need to re-add the server.
# SERVER_ID = ""

# Jellyfin protocol version reported to clients. The default is known to
# work with Swiftfin / Infuse / SenPlayer; override only for compatibility
# experiments (e.g. "10.10.6").
# JELLYFIN_VERSION = "10.11.0"


#################################################################################
# ---- Library Layout ----
#################################################################################

# Comma-separated tag names that appear as top-level folders.
# Example: TAG_GROUPS = "Favorites, VR, 4K, Featured"
TAG_GROUPS = ""

# Which library folders feed Infuse's "Recently Added" / SenPlayer banner.
# "Scenes" = all scenes; other entries must also appear in TAG_GROUPS.
# Example: LATEST_GROUPS = "Scenes, VR, Favorites"
LATEST_GROUPS = "Scenes"

# Tag used for scene + group favorites. Auto-created in Stash on first
# toggle (case-insensitive match against existing tags). Leave empty to
# disable scene/group favorites — performer + studio favorites still work.
# Example: FAVORITE_TAG = "Favorite"
# FAVORITE_TAG = ""

# Show Saved Filters folder (requires saved filters in Stash).
# ENABLE_FILTERS = true

# Show top-level Tags folder.
# ENABLE_TAG_FILTERS = false

# Include "All Tags" subfolder under Tags. Can be slow on large libraries.
# ENABLE_ALL_TAGS = false


#################################################################################
# ---- Series Detection ----
#################################################################################
# Studios tagged with this tag are presented as TV series — their scenes
# become Episodes. Swiftfin renders native Series → Season → Episode
# navigation; other clients see a flat collection.

# SERIES_TAG = "Series"

# Newline-separated regex chain used to parse "S01E03"-style titles into
# season/episode numbers. The first regex that matches wins. Each regex
# must capture two groups: (season, episode). Configure via the Web UI
# Libraries tab — it has a live regex tester.
# SERIES_EPISODE_PATTERNS =


#################################################################################
# ---- Playlists ----
#################################################################################
# Stash tag whose direct children represent Jellyfin playlists. Each
# child tag = one playlist; scenes carrying that child tag = its items.
# Auto-created on demand when first browsed. Empty string disables.
# Infuse and the Jellyfin web client get full create/rename/edit/delete UI;
# Swiftfin and SenPlayer get a read-only BoxSet-shaped view (their UI
# doesn't render the native Playlist type).

# PLAYLIST_PARENT_TAG = "Playlists"


#################################################################################
# ---- Player Profiles ----
#################################################################################
# Per-client behavior is configured via [player.*] INI sections (or the
# Players tab in the Web UI). Each profile matches a User-Agent substring
# and overrides image policy / item types for that client. The Players
# tab shows a live UA feed of recent clients for one-click profile
# creation.
#
# Example (matches Swiftfin's UA, gives it native Series support):
#
#   [player.swiftfin]
#   ua_match = Swiftfin
#   performer_item_type = Person
#   scene_poster_format = portrait
#   series_collection_type = tvshows
#
# A `[player.default]` section (no ua_match) defines the fallback used
# when no other profile matches.


#################################################################################
# ---- Genres ----
#################################################################################
# Three modes for what shows up under "Genres":
#   all_tags    — every Stash tag is a genre
#   parent_tag  — only descendants of GENRE_PARENT_TAG (default)
#   top_n       — the GENRE_TOP_N tags by scene count

# GENRE_MODE = "parent_tag"
# GENRE_PARENT_TAG = "GENRE"
# GENRE_TOP_N = 25


#################################################################################
# ---- Filter Panel ----
#################################################################################
# Swiftfin filter drawer (Years, Genres, Tags, Liked, Played).

# Max entries returned per dimension in /Items/Filters.
# FILTER_TAGS_MAX = 50

# AND  → scene must have every selected tag (INCLUDES_ALL).
# OR   → scene must have any (INCLUDES). Jellyfin's default is OR.
# GENRE_FILTER_LOGIC = "AND"

# When true, a selected tag also matches scenes tagged with any of its
# descendants in Stash's tag hierarchy.
# FILTER_TAGS_WALK_HIERARCHY = true


#################################################################################
# ---- Search Scope ----
#################################################################################

# SEARCH_INCLUDE_SCENES = true
# SEARCH_INCLUDE_PERFORMERS = true
# SEARCH_INCLUDE_STUDIOS = true
# SEARCH_INCLUDE_GROUPS = true


#################################################################################
# ---- Home / Hero / Banner ----
#################################################################################

# Hero source — pool the home-screen hero from:
#   recent             most-recently-added scenes (default)
#   random             uniform random across the library
#   favorites          scenes tagged FAVORITE_TAG
#   top_rated          scenes with rating100 >= HERO_MIN_RATING
#   recently_watched   scenes with last_played_at within 30 days
# HERO_SOURCE = "recent"
# HERO_MIN_RATING = 75

# SenPlayer rotating home banner.
#   recent — random sample from the newest BANNER_POOL_SIZE scenes
#   tag    — random sample from scenes matching any of BANNER_TAGS
# BANNER_MODE = "recent"
# BANNER_POOL_SIZE = 200
# BANNER_TAGS =


#################################################################################
# ---- Per-Library Default Sort ----
#################################################################################
# Used when a client lists items without specifying SortBy.
# Valid keys mirror Jellyfin: SortName, DateCreated, Random, PlayCount,
# CommunityRating, etc.

# SCENES_DEFAULT_SORT = "DateCreated"
# STUDIOS_DEFAULT_SORT = "SortName"
# PERFORMERS_DEFAULT_SORT = "SortName"
# GROUPS_DEFAULT_SORT = "SortName"
# TAG_GROUPS_DEFAULT_SORT = "PlayCount"
# SAVED_FILTERS_DEFAULT_SORT = "PlayCount"


#################################################################################
# ---- Image / Metadata Policy ----
#################################################################################

# Crop anchor when converting landscape sources to portrait.
# Values: top, center (default), bottom, smart.
# POSTER_CROP_ANCHOR = "center"

# String reported as OfficialRating on every item.
# OFFICIAL_RATING = "NC-17"

# Leading articles stripped for SortName so "The X" sorts under X.
# SORT_STRIP_ARTICLES = "The, A, An"

# Image resizing via Pillow. Pillow is a hard dependency; this only
# controls whether the proxy proactively re-encodes images.
# ENABLE_IMAGE_RESIZE = true

# Pillow output cache size (entries).
# IMAGE_CACHE_MAX_SIZE = 100


#################################################################################
# ---- Pagination ----
#################################################################################

# DEFAULT_PAGE_SIZE = 50
# MAX_PAGE_SIZE = 200


#################################################################################
# ---- Performance ----
#################################################################################

# Stash API request timeout (seconds).
# STASH_TIMEOUT = 30

# Stash API retry count for transient failures.
# STASH_RETRIES = 3


#################################################################################
# ---- Logging ----
#################################################################################

# LOG_DIR = "."
# LOG_FILE = "stash_jellyfin_proxy.log"
# LOG_LEVEL = "INFO"        # DEBUG / INFO / WARNING / ERROR
# LOG_MAX_SIZE_MB = 10
# LOG_BACKUP_COUNT = 3


#################################################################################
# ---- Security ----
#################################################################################

# Require login to access the Web UI.
# REQUIRE_AUTH_FOR_CONFIG = false

# IP banning for failed client auth.
# BAN_THRESHOLD = 10
# BAN_WINDOW_MINUTES = 15
